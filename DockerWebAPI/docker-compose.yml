services:
  webapi:
    build: .
    ports:
      - "5000:80"
    environment:
      - ConnectionStrings__Default=Server=sqldb;Database=BykeStores;User ID=SA;Password=SQLServer4$;Encrypt=False
    depends_on:
      - sqldb

  sqldb:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mysql_container
    environment:
      MSSQL_SA_PASSWORD: "SQLServer4$"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
      - ./init.sql:/init.sql:ro

volumes:
  sql_data: